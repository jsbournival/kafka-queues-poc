spring:
  application:
    name: kafka-queues-poc
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

app:
  kafka:
    topic: poc-queue-topic
    share-group-id: poc-share-group
    produce-on-startup: 400
    produce-delay-ms: 8000
    consumer:
      slow-sleep-ms: 500
      fast-sleep-ms: 0
      share-lock-duration-ms: 120000
